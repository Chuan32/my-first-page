<!DOCTYPE html>
<!-- 文档类型声明：告诉浏览器这是一个 HTML5 文档 -->
<html lang="en">
<!-- ↑ html 根标签，lang="en" 表示页面语言是英语 -->
<head>
    <!-- ↑ head 标签：存放页面的元信息（不显示在页面上） -->
    <meta charset="UTF-8">
    <!-- ↑ meta 定义元数据，charset="UTF-8" 表示使用 UTF-8 编码，支持中文 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ↑ viewport 让页面在手机上也正常显示（响应式设计的基础） -->
    <title>这是我第一个网页</title>
    <!-- ↑ title 标签：浏览器标签页上显示的文字 -->
</head>
<body>
    <!-- ↑ body 标签：页面上所有可见的内容都写在这里面 -->
    <h1>你好，世界！</h1>
    <!-- ↑ h1 标签：一级标题，页面上最大的标题 -->
    <p>这是我第一个HTML网页</p>
    <!-- ↑ p 标签：段落（paragraph），用来显示一段文字 -->
</body>
</html>
